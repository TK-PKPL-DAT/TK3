<!DOCTYPE html>
<html>
<head>
    <title>{{ mode }} Artist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
        <h2 class="text-2xl font-black text-slate-800 mb-8">{{ mode }} Artist</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Nama Artist</label>
                    <input type="text" name="name" value="{{ data.0 }}" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-2">Genre</label>
                    <input type="text" name="genre" value="{{ data.1 }}" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold" required>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black mt-10 shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest">
                {% if mode == 'Update' %}Simpan Perubahan{% else %}Tambah Artis{% endif %}
            </button>
            <a href="{% url 'fitur_hijau:list_artist' %}" class="block text-center mt-6 text-slate-300 font-bold text-xs uppercase tracking-widest hover:text-slate-500 transition-colors">Batal</a>
        </form>
    </div>
</body>
</html>
