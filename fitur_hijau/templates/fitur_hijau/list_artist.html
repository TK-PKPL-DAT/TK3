<!DOCTYPE html>
<html>
<head>
    <title>Daftar Artist - TikTakTuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8FAFC] p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="mb-4 flex gap-2">
            <a href="{% url 'fitur_hijau:mock_login' 'admin' %}" class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">LOGIN ADMIN</a>
            <a href="{% url 'fitur_hijau:mock_login' 'guest' %}" class="text-[10px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold">LOGIN GUEST</a>
        </div>

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Daftar Artis</h1>
            {% if is_admin %}
            <a href="{% url 'fitur_hijau:create_artist' %}" class="bg-[#2563EB] text-white px-5 py-2 rounded-xl font-bold shadow-lg shadow-blue-100">+ Tambah Artis</a>
            {% endif %}
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr class="text-slate-400 text-[10px] uppercase font-black tracking-widest">
                        <th class="px-10 py-5">Artist</th>
                        <th class="px-10 py-5">Genre</th>
                        {% if is_admin %}<th class="px-10 py-5 text-center">Aksi</th>{% endif %}
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    {% for a in artis %}
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-10 py-6 font-bold text-slate-700">{{ a.1 }}</td>
                        <td class="px-10 py-6 text-slate-400 italic text-sm">{{ a.2 }}</td>
                        {% if is_admin %}
                        <td class="px-10 py-6 text-center flex justify-center gap-4">
                            <a href="{% url 'fitur_hijau:update_artist' a.0 %}" class="text-slate-300 hover:text-blue-600 transition-colors">📝</a>
                            <a href="{% url 'fitur_hijau:delete_artist' a.0 %}" onclick="return confirm('Hapus artist ini?')" class="text-slate-300 hover:text-red-500 transition-colors">🗑️</a>
                        </td>
                        {% endif %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-6 text-center"><a href="{% url 'fitur_hijau:list_ticket' %}" class="text-blue-600 font-bold hover:underline italic">Kelola Kategori Tiket &rarr;</a></div>
    </div>
</body>
</html>
