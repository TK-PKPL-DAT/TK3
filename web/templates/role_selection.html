<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - TikTakTuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .role-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        .role-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .role-header .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .role-header h1 {
            color: #333;
            font-weight: bold;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .role-header p {
            color: #666;
            font-size: 16px;
            margin-bottom: 0;
        }
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .role-card {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .role-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        .role-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        .role-card .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .role-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .role-card p {
            font-size: 13px;
            color: #999;
            margin-bottom: 0;
            line-height: 1.4;
        }
        .role-card.active p {
            color: #666;
        }
        .login-link {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="role-container">
        <div class="role-header">
            <div class="icon">🎫</div>
            <h1>TikTakTuk</h1>
            <p>Daftar untuk Memulai</p>
        </div>

        <div class="roles-grid">
            <a href="{% url 'register_form' %}?role=customer" class="role-card">
                <div class="icon">👤</div>
                <h3>Pelanggan</h3>
                <p>Beli dan kelola tiket untuk acara favorit Anda</p>
            </a>

            <a href="{% url 'register_form' %}?role=organizer" class="role-card">
                <div class="icon">🎪</div>
                <h3>Penyelenggara</h3>
                <p>Buat dan kelola acara serta venue Anda</p>
            </a>

            <a href="{% url 'register_form' %}?role=admin" class="role-card">
                <div class="icon">⚙️</div>
                <h3>Admin</h3>
                <p>Kelola sistem dan pengguna platform</p>
            </a>
        </div>

        <div class="login-link">
            Sudah punya akun? <a href="{% url 'login' %}">Login di sini</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
